name: DWH Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: queuepulse
          POSTGRES_USER: queuepulse
          POSTGRES_PASSWORD: queuepulse123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U queuepulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Wait for PostgreSQL
        run: sleep 30
      
      - name: Send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import requests
          import subprocess
          from datetime import datetime
          
          BOT_TOKEN = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          CHAT_ID = '${{ secrets.TELEGRAM_CHAT_ID }}'
          
          # Get data from PostgreSQL
          orders = subprocess.run(
              ['docker', 'exec', 'queuepulse-postgres', 'psql', '-U', 'queuepulse', '-d', 'queuepulse', '-t', '-c', 'SELECT COUNT(*) FROM dwh.fact_orders'],
              capture_output=True, text=True
          ).stdout.strip() or '0'
          
          revenue = subprocess.run(
              ['docker', 'exec', 'queuepulse-postgres', 'psql', '-U', 'queuepulse', '-d', 'queuepulse', '-t', '-c', 'SELECT COALESCE(ROUND(SUM(amount)::numeric, 2), 0) FROM dwh.fact_orders'],
              capture_output=True, text=True
          ).stdout.strip() or '0'
          
          message = f'''
QUEUEPULSE DWH REPORT
{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
------------------------
Total Orders: {int(orders):,}
Total Revenue: ${float(revenue):,.2f}
------------------------
Status: OPERATIONAL
'''
          
          url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
          r = requests.post(url, json={'chat_id': CHAT_ID, 'text': message})
          print(f'Status: {r.status_code}')
          print('Report sent!')
          "
