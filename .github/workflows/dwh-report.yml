name: Daily DWH Report

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: queuepulse
          POSTGRES_USER: queuepulse
          POSTGRES_PASSWORD: queuepulse123
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U queuepulse" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Wait for PostgreSQL
        run: sleep 20
      
      - name: Run report script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_report.py
