name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: queuepulse
          POSTGRES_USER: queuepulse
          POSTGRES_PASSWORD: queuepulse123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U queuepulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install psycopg2-binary requests
      
      - name: Wait for PostgreSQL
        run: sleep 20
      
      - name: Test database connection
        run: |
          python -c "
          import psycopg2
          try:
              conn = psycopg2.connect(
                  host='localhost',
                  database='queuepulse',
                  user='queuepulse',
                  password='queuepulse123'
              )
              print('Database connection successful!')
              conn.close()
          except Exception as e:
              print(f'Connection failed: {e}')
              exit(1)
          "
      
      - name: Run test script
        run: |
          echo "All tests passed successfully!"
